<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensor Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --card: #1a1d27;
  --border: rgba(255,255,255,0.07);
  --text: #f0f2f8; --text2: #8b90a7; --text3: #4a4f6a;
  --font: 'Space Grotesk', sans-serif;
}
body {
  background: var(--bg); color: var(--text); font-family: var(--font);
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 40px 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(255,160,50,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(100,160,255,0.04) 0%, transparent 50%);
  pointer-events: none;
}
h1 { font-size: 13px; font-weight: 500; color: var(--text3); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
.location { font-size: 15px; color: var(--text2); margin-bottom: 48px; display: flex; align-items: center; gap: 6px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 100%; max-width: 520px; }

/* 4 ô vuông trên */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 28px 24px 24px;
  display: flex; flex-direction: column; align-items: flex-start;
  position: relative; overflow: hidden;
  transition: border-color 0.3s, transform 0.2s;
}
.card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.13); }
.card::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 120px; height: 120px; border-radius: 50%; opacity: 0.12; filter: blur(40px);
}
.card.temp::before  { background: #ff9a3c; }
.card.hum::before   { background: #4db8ff; }
.card.press::before { background: #a78bfa; }
.card.dust::before  { background: #fb7185; }

.icon-wrap {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; margin-bottom: 20px;
}
.card.temp  .icon-wrap { background: rgba(255,154,60,0.12); }
.card.hum   .icon-wrap { background: rgba(77,184,255,0.12); }
.card.press .icon-wrap { background: rgba(167,139,250,0.12); }
.card.dust  .icon-wrap { background: rgba(251,113,133,0.12); }

.label { font-size: 12px; font-weight: 500; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.value-row { display: flex; align-items: baseline; gap: 4px; }
.value { font-size: 38px; font-weight: 700; line-height: 1; }
.unit { font-size: 14px; font-weight: 400; color: var(--text2); }
.card.temp  .value { color: #ff9a3c; }
.card.hum   .value { color: #4db8ff; }
.card.press .value { color: #a78bfa; }
.card.dust  .value { color: #fb7185; }

/* Ô thứ 5 — Chất lượng không khí */
.card-air {
  grid-column: 1 / -1;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 28px 32px;
  display: flex; align-items: center; justify-content: space-between;
  position: relative; overflow: hidden;
  transition: border-color 0.3s, transform 0.2s;
}
.card-air:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.13); }
.card-air::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 160px; height: 160px; border-radius: 50%; opacity: 0.1; filter: blur(50px);
  background: #34d399;
  transition: background 0.5s;
}
.card-air.Kem::before    { background: #f87171; }
.card-air.Trung-binh::before { background: #fbbf24; }
.card-air.Tot::before    { background: #34d399; }

.air-left { display: flex; flex-direction: column; gap: 8px; }
.air-label { font-size: 12px; font-weight: 500; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; }
.air-value {
  font-size: 32px; font-weight: 700; line-height: 1;
  color: #34d399;
  transition: color 0.5s;
}
.air-value.Kem    { color: #f87171; }
.air-value.Trung-binh { color: #fbbf24; }
.air-value.Tot    { color: #34d399; }

.air-right { display: flex; align-items: center; gap: 12px; }
.air-icon-wrap {
  width: 64px; height: 64px; border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
  background: rgba(52,211,153,0.12);
  transition: background 0.5s;
}
.air-icon-wrap.Kem    { background: rgba(248,113,113,0.12); }
.air-icon-wrap.Trung-binh { background: rgba(251,191,36,0.12); }
.air-icon-wrap.Tot    { background: rgba(52,211,153,0.12); }

/* Indicator dots */
.air-dots { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
.dot-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3); }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text3); }
.dot.active-tot    { background: #34d399; box-shadow: 0 0 6px #34d399; }
.dot.active-tb     { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; }
.dot.active-kem    { background: #f87171; box-shadow: 0 0 6px #f87171; }

@keyframes flashVal { 0%{opacity:0.4;transform:scale(0.95)} 100%{opacity:1;transform:scale(1)} }
.value.updated { animation: flashVal 0.4s ease-out; }
.air-value.updated { animation: flashVal 0.4s ease-out; }
@keyframes shimmer { 0%{opacity:0.3} 50%{opacity:0.7} 100%{opacity:0.3} }
.value.loading { animation: shimmer 1.2s ease-in-out infinite; color: var(--text3) !important; }
.air-value.loading { animation: shimmer 1.2s ease-in-out infinite; color: var(--text3) !important; }

.footer { margin-top: 40px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text3); font-family: 'Inter', sans-serif; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); transition: background 0.3s, box-shadow 0.3s; }
.live-dot.on { background: #34d399; box-shadow: 0 0 8px #34d399; animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

@media (max-width: 400px) { .grid { grid-template-columns: 1fr; } .value { font-size: 32px; } .air-value { font-size: 26px; } }
</style>
</head>
<body>

<h1>TRẠM THEO DÕI DỮ LIỆU</h1>
<div class="location">📍 ĐỒ ÁN VI ĐIỀU KHIỂN</div>

<div class="grid">
  <div class="card temp">
    <div class="icon-wrap">☀️</div>
    <div class="label">Nhiệt độ</div>
    <div class="value-row">
      <div class="value loading" id="val-temp">--</div>
      <div class="unit">°C</div>
    </div>
  </div>

  <div class="card hum">
    <div class="icon-wrap">💧</div>
    <div class="label">Độ ẩm</div>
    <div class="value-row">
      <div class="value loading" id="val-hum">--</div>
      <div class="unit">%</div>
    </div>
  </div>

  <div class="card press">
    <div class="icon-wrap">🌡️</div>
    <div class="label">Áp suất</div>
    <div class="value-row">
      <div class="value loading" id="val-press">--</div>
      <div class="unit">hPa</div>
    </div>
  </div>

  <div class="card dust">
    <div class="icon-wrap">🌫️</div>
    <div class="label">Mật độ bụi</div>
    <div class="value-row">
      <div class="value loading" id="val-dust">--</div>
      <div class="unit">mg/m³</div>
    </div>
  </div>

  <!-- Ô thứ 5: Chất lượng không khí -->
  <div class="card-air" id="card-air">
    <div class="air-left">
      <div class="air-label">Chất lượng không khí</div>
      <div class="air-value loading" id="val-gas">--</div>
    </div>
    <div class="air-right">
      <div class="air-dots">
        <div class="dot-row"><span>Tốt</span><div class="dot" id="dot-tot"></div></div>
        <div class="dot-row"><span>Trung bình</span><div class="dot" id="dot-tb"></div></div>
        <div class="dot-row"><span>Kém</span><div class="dot" id="dot-kem"></div></div>
      </div>
      <div class="air-icon-wrap" id="air-icon">💨</div>
    </div>
  </div>
</div>

<div class="footer">
  <div class="live-dot" id="live-dot"></div>
  <span id="live-label">Đang kết nối...</span>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyA7gPPjSLjpqX3BzYD-wWwdUsj8ugdxbYQ",
  authDomain: "do-an-vdk-9a340.firebaseapp.com",
  databaseURL: "https://do-an-vdk-9a340-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "do-an-vdk-9a340",
  storageBucket: "do-an-vdk-9a340.firebasestorage.app",
  messagingSenderId: "836585339568",
  appId: "1:836585339568:web:0ac39f09e15a3df8375975"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let updateCount = 0;

function updateVal(id, raw) {
  const el = document.getElementById(id);
  const num = parseFloat(raw);
  if (isNaN(num)) return;
  const display = Number.isInteger(num) ? num : num.toFixed(2);
  el.classList.remove('loading');
  if (el.textContent !== String(display)) {
    el.textContent = display;
    el.classList.remove('updated');
    void el.offsetWidth;
    el.classList.add('updated');
  }
}

function updateAirQuality(val) {
  if (!val) return;

  // Map giá trị từ Firebase sang class CSS (không dấu, không khoảng trắng)
  const map = {
    'Tot': { label: 'Tốt', cls: 'Tot', icon: '🌿' },
    'Trung binh': { label: 'Trung bình', cls: 'Trung-binh', icon: '😐' },
    'Kem': { label: 'Kém', cls: 'Kem', icon: '⚠️' },
  };

  const info = map[val] || { label: val, cls: 'Tot', icon: '💨' };

  const elVal   = document.getElementById('val-gas');
  const elCard  = document.getElementById('card-air');
  const elIcon  = document.getElementById('air-icon');
  const dotTot  = document.getElementById('dot-tot');
  const dotTb   = document.getElementById('dot-tb');
  const dotKem  = document.getElementById('dot-kem');

  elVal.classList.remove('loading', 'Tot', 'Trung-binh', 'Kem', 'updated');
  elCard.classList.remove('Tot', 'Trung-binh', 'Kem');
  elIcon.classList.remove('Tot', 'Trung-binh', 'Kem');
  dotTot.className = 'dot';
  dotTb.className  = 'dot';
  dotKem.className = 'dot';

  void elVal.offsetWidth;

  elVal.textContent = info.label;
  elVal.classList.add(info.cls, 'updated');
  elCard.classList.add(info.cls);
  elIcon.classList.add(info.cls);
  elIcon.textContent = info.icon;

  if (info.cls === 'Tot')        dotTot.className = 'dot active-tot';
  else if (info.cls === 'Trung-binh') dotTb.className  = 'dot active-tb';
  else if (info.cls === 'Kem')   dotKem.className = 'dot active-kem';
}

onValue(ref(db, '/sensor'), snap => {
  const d = snap.val();
  if (!d) return;

  updateVal('val-temp',  d.temp);
  updateVal('val-hum',   d.hum);
  updateVal('val-press', d.press);
  updateVal('val-dust',  d.dust);
  updateAirQuality(d.gas);

  updateCount++;
  const now = new Date().toLocaleTimeString('vi-VN');
  document.getElementById('live-dot').className = 'live-dot on';
  document.getElementById('live-label').textContent = `Cập nhật lúc ${now} · #${updateCount}`;

}, err => {
  document.getElementById('live-label').textContent = 'Lỗi kết nối: ' + err.message;
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Realtime Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0e1a; --surface: #111827; --surface2: #1a2236;
    --border: rgba(99,179,255,0.12); --border2: rgba(99,179,255,0.25);
    --accent: #63b3ff; --accent2: #34d399; --accent3: #f59e0b; --accent4: #f87171;
    --text: #e2e8f0; --text2: #94a3b8; --text3: #475569;
    --font-mono: 'IBM Plex Mono', monospace; --font-sans: 'IBM Plex Sans', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font-sans); font-size: 14px; min-height: 100vh; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(rgba(99,179,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(99,179,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }
  .app { position: relative; z-index: 1; }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px; border-bottom: 1px solid var(--border);
    background: rgba(10,14,26,0.85); backdrop-filter: blur(8px);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-family: var(--font-mono); font-size: 15px; font-weight: 600; color: var(--accent); letter-spacing: 0.05em; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
  .status-badge { display: flex; align-items: center; gap: 6px; font-family: var(--font-mono); font-size: 11px; color: var(--text2); letter-spacing: 0.08em; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); transition: background 0.3s, box-shadow 0.3s; }
  .status-dot.connected { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: blink 2s ease-in-out infinite; }
  .status-dot.error { background: var(--accent4); box-shadow: 0 0 8px var(--accent4); }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .dash-body { padding: 24px 28px; }
  .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 18px; transition: border 0.2s; }
  .stat-card:hover { border-color: var(--border2); }
  .stat-label { font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .stat-value { font-family: var(--font-mono); font-size: 22px; font-weight: 600; color: var(--text); line-height: 1; }
  .stat-value.accent { color: var(--accent); }
  .stat-value.green { color: var(--accent2); }
  .path-tabs { display: flex; gap: 4px; margin-bottom: 24px; overflow-x: auto; padding-bottom: 2px; }
  .path-tab { font-family: var(--font-mono); font-size: 11px; padding: 6px 14px; border-radius: 5px; cursor: pointer; transition: all 0.15s; white-space: nowrap; background: transparent; border: 1px solid var(--border); color: var(--text2); }
  .path-tab:hover { border-color: var(--border2); color: var(--text); }
  .path-tab.active { background: rgba(99,179,255,0.1); border-color: var(--accent); color: var(--accent); }
  .data-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .panel-title { font-family: var(--font-mono); font-size: 12px; color: var(--text2); letter-spacing: 0.08em; }
  .panel-meta { display: flex; align-items: center; gap: 12px; }
  .update-flash { font-family: var(--font-mono); font-size: 10px; color: var(--accent2); opacity: 0; letter-spacing: 0.06em; transition: opacity 0.3s; }
  .update-flash.show { opacity: 1; }
  .data-table { width: 100%; border-collapse: collapse; }
  .data-table th { font-family: var(--font-mono); font-size: 10px; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 18px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 500; }
  .data-table td { padding: 11px 18px; border-bottom: 1px solid rgba(99,179,255,0.05); font-family: var(--font-mono); font-size: 12px; color: var(--text); vertical-align: top; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr { transition: background 0.15s; }
  .data-table tr:hover td { background: rgba(99,179,255,0.04); }
  .data-table tr.row-new td { animation: rowFlash 0.8s ease-out; }
  @keyframes rowFlash { 0%{background:rgba(99,179,255,0.15)} 100%{background:transparent} }
  .key-cell { color: var(--accent); }
  .val-str { color: var(--accent2); }
  .val-num { color: var(--accent3); }
  .val-bool-t { color: var(--accent2); }
  .val-bool-f { color: var(--accent4); }
  .val-null { color: var(--text3); }
  .val-obj { color: var(--text2); font-size: 11px; }
  #json-view { display: none; padding: 18px; max-height: 500px; overflow-y: auto; }
  #json-view pre { font-family: var(--font-mono); font-size: 12px; color: var(--text2); line-height: 1.7; white-space: pre-wrap; word-break: break-all; }
  .view-toggle { display: flex; gap: 4px; }
  .view-btn { font-family: var(--font-mono); font-size: 10px; padding: 4px 10px; border-radius: 4px; border: 1px solid transparent; cursor: pointer; transition: all 0.15s; letter-spacing: 0.06em; background: transparent; color: var(--text3); }
  .view-btn.active { background: rgba(99,179,255,0.1); color: var(--accent); border-color: var(--border); }
  .view-btn:hover:not(.active) { color: var(--text2); }
  .empty-state { padding: 48px; text-align: center; color: var(--text3); font-family: var(--font-mono); font-size: 13px; }
  #error-toast { position: fixed; bottom: 24px; right: 24px; background: rgba(248,113,113,0.1); border: 1px solid var(--accent4); color: var(--accent4); font-family: var(--font-mono); font-size: 12px; padding: 12px 18px; border-radius: 8px; max-width: 360px; display: none; z-index: 999; line-height: 1.5; }
  .loading { padding: 48px; text-align: center; color: var(--text3); font-family: var(--font-mono); font-size: 13px; }
  .loading span { display: inline-block; animation: dots 1.2s infinite; }
  @keyframes dots { 0%,100%{opacity:0.2} 50%{opacity:1} }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  @media (max-width: 600px) { header { padding: 14px 16px; } .dash-body { padding: 16px; } }

  /* Path manager */
  .path-manager { display: flex; align-items: center; gap: 8px; }
  .btn-add-path { font-family: var(--font-mono); font-size: 10px; padding: 5px 12px; border-radius: 5px; background: transparent; border: 1px dashed var(--border2); color: var(--accent); cursor: pointer; transition: all 0.15s; letter-spacing: 0.06em; }
  .btn-add-path:hover { background: rgba(99,179,255,0.06); }
  .path-tab .remove-tab { margin-left: 6px; opacity: 0.4; font-size: 10px; }
  .path-tab:hover .remove-tab { opacity: 1; }
  #add-path-form { display: none; align-items: center; gap: 8px; margin-bottom: 12px; }
  #add-path-form input { background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px; padding: 7px 12px; color: var(--text); font-family: var(--font-mono); font-size: 12px; outline: none; width: 240px; }
  #add-path-form input:focus { border-color: var(--accent); }
  .btn-confirm { font-family: var(--font-mono); font-size: 11px; padding: 7px 14px; border-radius: 5px; background: var(--accent); color: #0a0e1a; border: none; cursor: pointer; font-weight: 600; }
  .btn-cancel { font-family: var(--font-mono); font-size: 11px; padding: 7px 12px; border-radius: 5px; background: transparent; color: var(--text3); border: 1px solid var(--border); cursor: pointer; }
</style>
</head>
<body>
<div class="app">

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    DO AN VDK — LIVE
  </div>
  <div class="status-badge">
    <div class="status-dot" id="conn-dot"></div>
    <span id="conn-label">ĐANG KẾT NỐI...</span>
  </div>
</header>

<div class="dash-body">

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Tổng keys</div>
      <div class="stat-value accent" id="stat-keys">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Cập nhật lần cuối</div>
      <div class="stat-value" id="stat-time" style="font-size:13px">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Số lần cập nhật</div>
      <div class="stat-value green" id="stat-updates">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Project</div>
      <div class="stat-value" style="font-size:11px;color:var(--text2)">do-an-vdk-9a340</div>
    </div>
  </div>

  <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap;">
    <div class="path-tabs" id="path-tabs" style="margin-bottom:0; flex:1;"></div>
    <div class="path-manager">
      <button class="btn-add-path" onclick="showAddPath()">+ Thêm path</button>
    </div>
  </div>

  <div id="add-path-form" style="margin-bottom:12px;">
    <input type="text" id="new-path-input" placeholder="/sensors/device1" />
    <button class="btn-confirm" onclick="confirmAddPath()">Thêm</button>
    <button class="btn-cancel" onclick="hideAddPath()">Hủy</button>
  </div>

  <div class="data-panel">
    <div class="panel-header">
      <span class="panel-title" id="active-path-label">// loading...</span>
      <div class="panel-meta">
        <span class="update-flash" id="update-flash">● UPDATED</span>
        <div class="view-toggle">
          <button class="view-btn active" id="btn-table" onclick="setView('table')">TABLE</button>
          <button class="view-btn" id="btn-json" onclick="setView('json')">JSON</button>
        </div>
      </div>
    </div>

    <div id="table-view">
      <div class="loading" id="loading-msg">Đang tải dữ liệu <span>...</span></div>
      <table class="data-table" id="data-table" style="display:none">
        <thead>
          <tr>
            <th style="width:35%">KEY</th>
            <th>VALUE</th>
            <th style="width:90px">TYPE</th>
          </tr>
        </thead>
        <tbody id="data-tbody"></tbody>
      </table>
      <div class="empty-state" id="empty-msg" style="display:none">Chưa có dữ liệu tại path này</div>
    </div>

    <div id="json-view">
      <pre id="json-content"></pre>
    </div>
  </div>

</div>
</div>

<div id="error-toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getDatabase, ref, onValue, off } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

  const firebaseConfig = {
    apiKey: "AIzaSyA7gPPjSLjpqX3BzYD-wWwdUsj8ugdxbYQ",
    authDomain: "do-an-vdk-9a340.firebaseapp.com",
    databaseURL: "https://do-an-vdk-9a340-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "do-an-vdk-9a340",
    storageBucket: "do-an-vdk-9a340.firebasestorage.app",
    messagingSenderId: "836585339568",
    appId: "1:836585339568:web:0ac39f09e15a3df8375975",
    measurementId: "G-3KLW5VJ33M"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  window._listeners = {};
  window._dataStore = {};
  window._updateCount = 0;
  window._activeTab = null;
  window._currentView = 'table';
  window._paths = ['/'];

  function setStatus(state, label) {
    const dot = document.getElementById('conn-dot');
    const lbl = document.getElementById('conn-label');
    dot.className = 'status-dot ' + (state === 'connected' ? 'connected' : state === 'error' ? 'error' : '');
    lbl.textContent = label;
  }

  function flashUpdate() {
    const el = document.getElementById('update-flash');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1200);
  }

  function showError(msg) {
    const toast = document.getElementById('error-toast');
    toast.textContent = '⚠ ' + msg;
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 6000);
  }

  function listenPath(path) {
    if (window._listeners[path]) return;
    const dbRef = ref(db, path);
    window._listeners[path] = onValue(dbRef, snap => {
      window._dataStore[path] = snap.val();
      window._updateCount++;
      setStatus('connected', 'LIVE');
      document.getElementById('stat-updates').textContent = window._updateCount;
      document.getElementById('stat-time').textContent = new Date().toLocaleTimeString('vi-VN');
      document.getElementById('loading-msg').style.display = 'none';
      if (window._activeTab === path) renderData(path);
      flashUpdate();
    }, err => {
      setStatus('error', 'LỖI KẾT NỐI');
      showError(`"${path}": ${err.message}`);
      document.getElementById('loading-msg').style.display = 'none';
    });
  }

  function buildTabs(paths) {
    const tabsEl = document.getElementById('path-tabs');
    tabsEl.innerHTML = '';
    paths.forEach((p, i) => {
      const tab = document.createElement('button');
      tab.className = 'path-tab' + (i === 0 && !window._activeTab ? ' active' : (window._activeTab === p ? ' active' : ''));
      tab.dataset.path = p;
      tab.innerHTML = `${p}${paths.length > 1 ? `<span class="remove-tab" onclick="removeTab(event,'${p}')">✕</span>` : ''}`;
      tab.onclick = (e) => { if (!e.target.classList.contains('remove-tab')) switchTab(p); };
      tabsEl.appendChild(tab);
    });
    if (!window._activeTab || !paths.includes(window._activeTab)) {
      window._activeTab = paths[0];
    }
    document.getElementById('active-path-label').textContent = `// ${window._activeTab}`;
  }

  window.switchTab = function(path) {
    window._activeTab = path;
    document.querySelectorAll('.path-tab').forEach(t => t.classList.toggle('active', t.dataset.path === path));
    document.getElementById('active-path-label').textContent = `// ${path}`;
    if (window._dataStore[path] !== undefined) {
      document.getElementById('loading-msg').style.display = 'none';
      renderData(path);
    } else {
      document.getElementById('loading-msg').style.display = 'block';
      document.getElementById('data-table').style.display = 'none';
      document.getElementById('empty-msg').style.display = 'none';
    }
  };

  window.removeTab = function(e, path) {
    e.stopPropagation();
    if (window._paths.length <= 1) return;
    if (window._listeners[path]) { off(ref(db, path)); delete window._listeners[path]; }
    delete window._dataStore[path];
    window._paths = window._paths.filter(p => p !== path);
    if (window._activeTab === path) window._activeTab = null;
    buildTabs(window._paths);
    switchTab(window._activeTab || window._paths[0]);
  };

  window.showAddPath = function() {
    document.getElementById('add-path-form').style.display = 'flex';
    document.getElementById('new-path-input').focus();
  };

  window.hideAddPath = function() {
    document.getElementById('add-path-form').style.display = 'none';
    document.getElementById('new-path-input').value = '';
  };

  window.confirmAddPath = function() {
    const val = document.getElementById('new-path-input').value.trim() || '/';
    const path = val.startsWith('/') ? val : '/' + val;
    if (!window._paths.includes(path)) {
      window._paths.push(path);
      listenPath(path);
      buildTabs(window._paths);
    }
    hideAddPath();
    switchTab(path);
  };

  document.getElementById('new-path-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.confirmAddPath();
    if (e.key === 'Escape') window.hideAddPath();
  });

  function renderData(path) {
    const data = window._dataStore[path];
    document.getElementById('json-content').textContent = JSON.stringify(data, null, 2);
    if (window._currentView === 'json') return;

    if (data === null || data === undefined) {
      document.getElementById('data-table').style.display = 'none';
      document.getElementById('empty-msg').style.display = 'block';
      document.getElementById('stat-keys').textContent = '0';
      return;
    }

    document.getElementById('empty-msg').style.display = 'none';
    document.getElementById('data-table').style.display = 'table';

    const flat = flattenData(data);
    const keys = Object.keys(flat);
    document.getElementById('stat-keys').textContent = keys.length;

    const tbody = document.getElementById('data-tbody');
    tbody.innerHTML = '';
    keys.forEach(key => {
      const val = flat[key];
      const tr = document.createElement('tr');
      tr.className = 'row-new';
      tr.innerHTML = `
        <td class="key-cell">${esc(key)}</td>
        <td class="${typeClass(val)}">${formatVal(val)}</td>
        <td><span style="font-size:10px;color:var(--text3);letter-spacing:0.08em">${getType(val)}</span></td>
      `;
      tbody.appendChild(tr);
      setTimeout(() => tr.classList.remove('row-new'), 900);
    });
  }

  function flattenData(obj, prefix='', result={}) {
    if (obj === null) { result[prefix || '(root)'] = null; return result; }
    if (typeof obj !== 'object') { result[prefix || '(root)'] = obj; return result; }
    const keys = Object.keys(obj);
    if (keys.length === 0) { result[prefix || '(root)'] = '{}'; return result; }
    keys.forEach(k => {
      const newKey = prefix ? `${prefix}.${k}` : k;
      const v = obj[k];
      if (v !== null && typeof v === 'object' && !Array.isArray(v) && Object.keys(v).length > 0 && Object.keys(v).length <= 6) {
        flattenData(v, newKey, result);
      } else {
        result[newKey] = v;
      }
    });
    return result;
  }

  function getType(v) {
    if (v === null) return 'null';
    if (Array.isArray(v)) return 'array';
    return typeof v;
  }

  function typeClass(v) {
    if (v === null) return 'val-null';
    if (typeof v === 'string') return 'val-str';
    if (typeof v === 'number') return 'val-num';
    if (typeof v === 'boolean') return v ? 'val-bool-t' : 'val-bool-f';
    return 'val-obj';
  }

  function formatVal(v) {
    if (v === null) return 'null';
    if (typeof v === 'boolean') return v ? 'true' : 'false';
    if (typeof v === 'string') return `"${esc(v)}"`;
    if (typeof v === 'object') { const s = JSON.stringify(v); return esc(s.slice(0, 80)) + (s.length > 80 ? '…' : ''); }
    return esc(String(v));
  }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  window.setView = function(view) {
    window._currentView = view;
    document.getElementById('table-view').style.display = view === 'table' ? 'block' : 'none';
    document.getElementById('json-view').style.display = view === 'json' ? 'block' : 'none';
    document.getElementById('btn-table').classList.toggle('active', view === 'table');
    document.getElementById('btn-json').classList.toggle('active', view === 'json');
    if (window._activeTab) renderData(window._activeTab);
  };

  // Init
  setStatus('connecting', 'ĐANG KẾT NỐI...');
  buildTabs(window._paths);
  window._paths.forEach(p => listenPath(p));
</script>
</body>
</html>

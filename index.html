<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sensor Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --card: #1a1d27;
  --border: rgba(255,255,255,0.07);
  --text: #f0f2f8; --text2: #8b90a7; --text3: #4a4f6a;
  --font: 'Space Grotesk', sans-serif;
}
body {
  background: var(--bg); color: var(--text); font-family: var(--font);
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 40px 20px 60px;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(255,160,50,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(100,160,255,0.04) 0%, transparent 50%);
  pointer-events: none;
}
h1 { font-size: 13px; font-weight: 500; color: var(--text3); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 8px; }
.location { font-size: 15px; color: var(--text2); margin-bottom: 48px; display: flex; align-items: center; gap: 6px; }
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; width: 100%; max-width: 520px; }
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 28px 24px 24px;
  display: flex; flex-direction: column; align-items: flex-start;
  position: relative; overflow: hidden;
  transition: border-color 0.3s, transform 0.2s;
}
.card:hover { transform: translateY(-2px); border-color: rgba(255,255,255,0.13); }
.card::before {
  content: ''; position: absolute; top: -40px; right: -40px;
  width: 120px; height: 120px; border-radius: 50%; opacity: 0.12; filter: blur(40px);
}
.card.temp::before  { background: #ff9a3c; }
.card.hum::before   { background: #4db8ff; }
.card.press::before { background: #a78bfa; }
.card.gas::before   { background: #34d399; }

.icon-wrap {
  width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; margin-bottom: 20px;
}
.card.temp  .icon-wrap { background: rgba(255,154,60,0.12); }
.card.hum   .icon-wrap { background: rgba(77,184,255,0.12); }
.card.press .icon-wrap { background: rgba(167,139,250,0.12); }
.card.gas   .icon-wrap { background: rgba(52,211,153,0.12); }

.label { font-size: 12px; font-weight: 500; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
.value-row { display: flex; align-items: baseline; gap: 4px; }
.value { font-size: 38px; font-weight: 700; line-height: 1; }
.unit { font-size: 14px; font-weight: 400; color: var(--text2); }
.card.temp  .value { color: #ff9a3c; }
.card.hum   .value { color: #4db8ff; }
.card.press .value { color: #a78bfa; }
.card.gas   .value { color: #34d399; }

@keyframes flashVal { 0%{opacity:0.4;transform:scale(0.95)} 100%{opacity:1;transform:scale(1)} }
.value.updated { animation: flashVal 0.4s ease-out; }
@keyframes shimmer { 0%{opacity:0.3} 50%{opacity:0.7} 100%{opacity:0.3} }
.value.loading { animation: shimmer 1.2s ease-in-out infinite; color: var(--text3) !important; }

.footer { margin-top: 40px; display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--text3); font-family: 'Inter', sans-serif; }
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); transition: background 0.3s, box-shadow 0.3s; }
.live-dot.on { background: #34d399; box-shadow: 0 0 8px #34d399; animation: blink 2s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

@media (max-width: 400px) { .grid { grid-template-columns: 1fr; } .value { font-size: 32px; } }
</style>
</head>
<body>

<h1>TRẠM THEO DÕI DỮ LIỆU</h1>
<div class="location">📍 ĐỒ ÁN VI ĐIỀU KHIỂN</div>

<div class="grid">
  <div class="card temp">
    <div class="icon-wrap">☀️</div>
    <div class="label">Nhiệt độ</div>
    <div class="value-row">
      <div class="value loading" id="val-temp">--</div>
      <div class="unit">°C</div>
    </div>
  </div>

  <div class="card hum">
    <div class="icon-wrap">💧</div>
    <div class="label">Độ ẩm</div>
    <div class="value-row">
      <div class="value loading" id="val-hum">--</div>
      <div class="unit">%</div>
    </div>
  </div>

  <div class="card press">
    <div class="icon-wrap">🌡️</div>
    <div class="label">Áp suất</div>
    <div class="value-row">
      <div class="value loading" id="val-press">--</div>
      <div class="unit">hPa</div>
    </div>
  </div>

  <div class="card gas">
    <div class="icon-wrap">💨</div>
    <div class="label">Khí gas</div>
    <div class="value-row">
      <div class="value loading" id="val-gas">--</div>
      <div class="unit">kΩ</div>
    </div>
  </div>
</div>

<div class="footer">
  <div class="live-dot" id="live-dot"></div>
  <span id="live-label">Đang kết nối...</span>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
  apiKey: "AIzaSyA7gPPjSLjpqX3BzYD-wWwdUsj8ugdxbYQ",
  authDomain: "do-an-vdk-9a340.firebaseapp.com",
  databaseURL: "https://do-an-vdk-9a340-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "do-an-vdk-9a340",
  storageBucket: "do-an-vdk-9a340.firebasestorage.app",
  messagingSenderId: "836585339568",
  appId: "1:836585339568:web:0ac39f09e15a3df8375975"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let updateCount = 0;

function updateVal(id, raw) {
  const el = document.getElementById(id);
  const num = parseFloat(raw);
  if (isNaN(num)) return;
  const display = Number.isInteger(num) ? num : num.toFixed(2);
  el.classList.remove('loading');
  if (el.textContent !== String(display)) {
    el.textContent = display;
    el.classList.remove('updated');
    void el.offsetWidth;
    el.classList.add('updated');
  }
}

onValue(ref(db, '/sensor'), snap => {
  const d = snap.val();
  if (!d) return;

  updateVal('val-temp',  d.temp);
  updateVal('val-hum',   d.hum);
  updateVal('val-press', d.press);
  updateVal('val-gas',   d.gas);

  updateCount++;
  const now = new Date().toLocaleTimeString('vi-VN');
  document.getElementById('live-dot').className = 'live-dot on';
  document.getElementById('live-label').textContent = `Cập nhật lúc ${now} · #${updateCount}`;

}, err => {
  document.getElementById('live-label').textContent = 'Lỗi kết nối: ' + err.message;
});
</script>
</body>
</html>
